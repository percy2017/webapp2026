<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" preserveAspectRatio="xMidYMid slice" role="img" aria-label="WebApp v0.2 — digital calling card, reservations, live chat">
    <defs>
        <linearGradient id="bgBanner" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0a0814"/>
            <stop offset="55%" stop-color="#14101f"/>
            <stop offset="100%" stop-color="#050308"/>
        </linearGradient>
        <radialGradient id="haloLeft" cx="0.35" cy="0.5" r="0.45">
            <stop offset="0%" stop-color="#d49b3a" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#d49b3a" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="haloRight" cx="0.78" cy="0.5" r="0.4">
            <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.32"/>
            <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.06"/>
            <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="haloCenter" cx="0.78" cy="0.5" r="0.18">
            <stop offset="0%" stop-color="#fff5d8" stop-opacity="0.32"/>
            <stop offset="100%" stop-color="#fff5d8" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="goldWord" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff5d8"/>
            <stop offset="40%" stop-color="#f4d870"/>
            <stop offset="100%" stop-color="#8a5a18"/>
        </linearGradient>
        <linearGradient id="goldWordEdge" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff5d8" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#8a5a18" stop-opacity="0.9"/>
        </linearGradient>
        <linearGradient id="violetPulse" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#c4b5fd"/>
            <stop offset="100%" stop-color="#5b21b6"/>
        </linearGradient>
        <linearGradient id="ringGold" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff5d8"/>
            <stop offset="50%" stop-color="#f4d870"/>
            <stop offset="100%" stop-color="#8a5a18"/>
        </linearGradient>
        <linearGradient id="waveBar" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="#8a5a18" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#f4d870"/>
        </linearGradient>
        <linearGradient id="frameGold" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#d49b3a"/>
            <stop offset="100%" stop-color="#8a5a18"/>
        </linearGradient>
        <filter id="grainBanner" x="0" y="0" width="100%" height="100%">
            <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7"/>
            <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.61  0 0 0 0 0.23  0 0 0 0.16 0"/>
        </filter>
        <filter id="glowWord" x="-10%" y="-30%" width="120%" height="160%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
            <feOffset dx="0" dy="2"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <rect width="1280" height="640" fill="url(#bgBanner)"/>
    <rect width="1280" height="640" fill="url(#haloLeft)"/>
    <rect width="1280" height="640" fill="url(#haloRight)"/>
    <rect width="1280" height="640" fill="url(#haloCenter)"/>

    <g opacity="0.92" filter="url(#glowWord)">
        <text x="120" y="380"
              font-family="CrimsonPro-Italic, Playfair Display, serif"
              font-style="italic" font-weight="700"
              font-size="180" fill="url(#goldWord)"
              letter-spacing="-3">WebApp</text>
        <text x="120" y="380"
              font-family="CrimsonPro-Italic, Playfair Display, serif"
              font-style="italic" font-weight="700"
              font-size="180" fill="none"
              stroke="url(#goldWordEdge)" stroke-width="0.6"
              letter-spacing="-3" opacity="0.7">WebApp</text>
    </g>

    <g transform="translate(120, 195)">
        <line x1="0" y1="0" x2="60" y2="0" stroke="#d49b3a" stroke-width="1" opacity="0.65"/>
        <text x="74" y="5" font-family="JetBrainsMono-Regular, monospace"
              font-size="13" fill="#d49b3a" letter-spacing="6"
              opacity="0.85">A DIGITAL CALLING CARD</text>
    </g>

    <text x="120" y="450"
          font-family="CrimsonPro-Italic, Playfair Display, serif"
          font-style="italic" font-size="22" fill="#e8d8c4"
          opacity="0.85" letter-spacing="0.5">reservations · live chat · broadcast presets</text>

    <g transform="translate(120, 495)">
        <text x="0" y="0" font-family="JetBrainsMono-Regular, monospace"
              font-size="11" fill="#d49b3a" letter-spacing="3" opacity="0.7">LARAVEL 13</text>
        <text x="106" y="0" font-family="JetBrainsMono-Regular, monospace"
              font-size="11" fill="#d49b3a" letter-spacing="3" opacity="0.45">·</text>
        <text x="120" y="0" font-family="JetBrainsMono-Regular, monospace"
              font-size="11" fill="#d49b3a" letter-spacing="3" opacity="0.7">INERTIA 3</text>
        <text x="206" y="0" font-family="JetBrainsMono-Regular, monospace"
              font-size="11" fill="#d49b3a" letter-spacing="3" opacity="0.45">·</text>
        <text x="220" y="0" font-family="JetBrainsMono-Regular, monospace"
              font-size="11" fill="#d49b3a" letter-spacing="3" opacity="0.7">REACT 19</text>
        <text x="306" y="0" font-family="JetBrainsMono-Regular, monospace"
              font-size="11" fill="#d49b3a" letter-spacing="3" opacity="0.45">·</text>
        <text x="320" y="0" font-family="JetBrainsMono-Regular, monospace"
              font-size="11" fill="#d49b3a" letter-spacing="3" opacity="0.7">v0.2</text>
    </g>

    <g transform="translate(1010, 320)" opacity="0.96">
        <circle cx="0" cy="0" r="130" fill="none" stroke="url(#ringGold)" stroke-width="1.2" opacity="0.45"/>
        <circle cx="0" cy="0" r="108" fill="none" stroke="url(#ringGold)" stroke-width="0.7" opacity="0.55"/>
        <circle cx="0" cy="0" r="86" fill="#0a0814" stroke="url(#ringGold)" stroke-width="2"/>
        <circle cx="0" cy="0" r="22" fill="url(#violetPulse)"/>
        <circle cx="0" cy="0" r="11" fill="#fff5d8" opacity="0.95"/>
        <circle cx="0" cy="0" r="5" fill="#ffffff"/>

        <g>
            <rect x="-225" y="-58" width="6" height="116" rx="3" fill="url(#waveBar)" opacity="0.65"/>
            <rect x="-208" y="-78" width="6" height="156" rx="3" fill="url(#waveBar)" opacity="0.78"/>
            <rect x="-191" y="-48" width="6" height="96" rx="3" fill="url(#waveBar)" opacity="0.6"/>
            <rect x="-174" y="-92" width="6" height="184" rx="3" fill="url(#waveBar)" opacity="0.88"/>
            <rect x="-157" y="-32" width="6" height="64" rx="3" fill="url(#waveBar)" opacity="0.5"/>
            <rect x="-140" y="-66" width="6" height="132" rx="3" fill="url(#waveBar)" opacity="0.72"/>

            <rect x="134" y="-66" width="6" height="132" rx="3" fill="url(#waveBar)" opacity="0.72"/>
            <rect x="151" y="-32" width="6" height="64" rx="3" fill="url(#waveBar)" opacity="0.5"/>
            <rect x="168" y="-92" width="6" height="184" rx="3" fill="url(#waveBar)" opacity="0.88"/>
            <rect x="185" y="-48" width="6" height="96" rx="3" fill="url(#waveBar)" opacity="0.6"/>
            <rect x="202" y="-78" width="6" height="156" rx="3" fill="url(#waveBar)" opacity="0.78"/>
            <rect x="219" y="-58" width="6" height="116" rx="3" fill="url(#waveBar)" opacity="0.65"/>
        </g>

        <text x="0" y="-152" font-family="CrimsonPro-Italic, serif"
              font-style="italic" font-size="14" fill="#e8d8c4"
              text-anchor="middle" opacity="0.7" letter-spacing="2">PL. W</text>
        <text x="0" y="172" font-family="JetBrainsMono-Regular, monospace"
              font-size="10" fill="#d49b3a" text-anchor="middle"
              letter-spacing="6" opacity="0.65">CH. 01 · 1280 KHZ</text>
    </g>

    <text x="60" y="60"
          font-family="CrimsonPro-Italic, Playfair Display, serif"
          font-style="italic" font-size="16" fill="#e8d8c4" opacity="0.55"
          letter-spacing="2">PL. W — THE WEB</text>

    <text x="1220" y="60"
          font-family="JetBrainsMono-Regular, monospace"
          font-size="11" fill="#d49b3a" text-anchor="end" opacity="0.7"
          letter-spacing="3">STREAMING · PRESETS · CHAT</text>

    <text x="60" y="600"
          font-family="JetBrainsMono-Regular, monospace"
          font-size="10" fill="#d49b3a" opacity="0.55" letter-spacing="3">CALLING CARD · BOOKING · CHAT</text>

    <text x="1220" y="600"
          font-family="JetBrainsMono-Regular, monospace"
          font-size="10" fill="#d49b3a" text-anchor="end" opacity="0.7"
          letter-spacing="3">Nº 001 · MMXXVI</text>

    <rect x="20" y="20" width="1240" height="600" fill="none" stroke="url(#frameGold)" stroke-width="0.5" opacity="0.45"/>
    <rect x="35" y="35" width="1210" height="570" fill="none" stroke="url(#frameGold)" stroke-width="0.5" opacity="0.22"/>

    <g opacity="0.85">
        <path d="M 55 25 L 60 30 L 65 25 L 70 30 L 65 35 L 70 40 L 65 35 L 60 40 Z" fill="#f4d870" opacity="0.7"/>
        <path d="M 1215 25 L 1220 30 L 1225 25 L 1230 30 L 1225 35 L 1230 40 L 1225 35 L 1220 40 Z" fill="#f4d870" opacity="0.7"/>
    </g>

    <rect width="1280" height="640" filter="url(#grainBanner)" opacity="0.45"/>
</svg>
