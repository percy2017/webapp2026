<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Antes — muestra">
    <defs>
        <linearGradient id="bgBaB" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0a0814"/>
            <stop offset="100%" stop-color="#050308"/>
        </linearGradient>
        <radialGradient id="haloBaB" cx="0.5" cy="0.45" r="0.55">
            <stop offset="0%" stop-color="#525252" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#525252" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="silverBaB" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d4d4d8"/>
            <stop offset="100%" stop-color="#3f3f46"/>
        </linearGradient>
        <filter id="grainBaB" x="0" y="0" width="100%" height="100%">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="31"/>
            <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.61  0 0 0 0 0.23  0 0 0 0.18 0"/>
        </filter>
    </defs>

    <rect width="600" height="600" fill="url(#bgBaB)"/>
    <rect width="600" height="600" fill="url(#haloBaB)"/>

    <g transform="translate(300, 280)" opacity="0.92">
        <circle cx="0" cy="0" r="140" fill="none" stroke="url(#silverBaB)" stroke-width="3" opacity="0.5"/>
        <circle cx="0" cy="0" r="80" fill="none" stroke="url(#silverBaB)" stroke-width="2" opacity="0.7"/>
        <text x="0" y="14" font-family="Playfair Display, serif" font-style="italic" font-size="72" fill="url(#silverBaB)" text-anchor="middle" opacity="0.9">B</text>
    </g>

    <text x="30" y="40" font-family="JetBrains Mono, monospace" font-size="10" fill="#d49b3a" opacity="0.7" letter-spacing="2">SAMPLE · ANTES</text>
    <text x="570" y="570" font-family="Playfair Display, serif" font-style="italic" font-size="16" fill="#e8d8c4" opacity="0.7" text-anchor="end">Antes</text>

    <rect x="15" y="15" width="570" height="570" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.45"/>
    <rect x="30" y="30" width="540" height="540" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.2"/>

    <rect width="600" height="600" filter="url(#grainBaB)" opacity="0.5"/>
</svg>
