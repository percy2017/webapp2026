    <text x="400" y="935" font-family="JetBrains Mono, monospace" font-size="12" fill="#d49b3a" text-anchor="middle" letter-spacing="3">CLIENTE VIP</text>

    <rect x="20" y="20" width="760" height="960" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.45"/>
    <rect x="35" y="35" width="730" height="930" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.2"/>

