<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Logo — Streaming Store">
    <defs>
        <linearGradient id="bgStream" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0f0a1f"/>
            <stop offset="100%" stop-color="#050208"/>
        </linearGradient>
        <linearGradient id="strokeStream" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#a78bfa"/>
            <stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
    </defs>
    <rect width="512" height="512" rx="96" fill="url(#bgStream)"/>
    <circle cx="256" cy="256" r="200" fill="none" stroke="#7c3aed" stroke-width="4" opacity="0.35"/>

    <!-- Monitor / TV -->
    <rect x="96" y="128" width="320" height="200" rx="24"
          fill="#1a1233" stroke="url(#strokeStream)" stroke-width="10"/>
    <!-- Botón de Play dentro de la pantalla -->
    <circle cx="256" cy="228" r="56" fill="#7c3aed"/>
    <path d="M 240 200 L 240 256 L 286 228 Z" fill="#ffffff"/>

    <!-- Base del monitor -->
    <rect x="216" y="328" width="80" height="16" rx="6" fill="#7c3aed"/>
    <rect x="160" y="344" width="192" height="14" rx="7" fill="#7c3aed"/>

    <!-- Barras de sonido / señal debajo -->
    <g fill="#a78bfa" opacity="0.85">
        <rect x="156" y="396" width="14" height="28" rx="4"/>
        <rect x="184" y="384" width="14" height="40" rx="4"/>
        <rect x="212" y="372" width="14" height="52" rx="4"/>
        <rect x="240" y="384" width="14" height="40" rx="4"/>
        <rect x="268" y="396" width="14" height="28" rx="4"/>
        <rect x="296" y="408" width="14" height="16" rx="4"/>
        <rect x="324" y="396" width="14" height="28" rx="4"/>
        <rect x="352" y="384" width="14" height="40" rx="4"/>
    </g>
</svg>