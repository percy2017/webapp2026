<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Gallery — IRL en la calle">
    <defs>
        <linearGradient id="bgIrl" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0a0814"/>
            <stop offset="100%" stop-color="#050308"/>
        </linearGradient>
        <radialGradient id="haloIrl" cx="0.5" cy="0.45" r="0.55">
            <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="goldIrl" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff5d8"/>
            <stop offset="50%" stop-color="#f4d870"/>
            <stop offset="100%" stop-color="#8a5a18"/>
        </linearGradient>
        <linearGradient id="cyanIrl" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#67e8f9"/>
            <stop offset="100%" stop-color="#0e7490"/>
        </linearGradient>
        <filter id="grainIrl" x="0" y="0" width="100%" height="100%">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="23"/>
            <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.61  0 0 0 0 0.23  0 0 0 0.18 0"/>
        </filter>
    </defs>

    <rect width="600" height="600" fill="url(#bgIrl)"/>
    <rect width="600" height="600" fill="url(#haloIrl)"/>

    <g transform="translate(300, 270)" opacity="0.95">
        <path d="M 0 -130 C 60 -130 90 -90 90 -50 C 90 0 60 40 0 110 C -60 40 -90 0 -90 -50 C -90 -90 -60 -130 0 -130 Z" fill="url(#goldIrl)"/>
        <circle cx="0" cy="-50" r="36" fill="#0a0814" stroke="url(#cyanIrl)" stroke-width="3"/>
        <circle cx="0" cy="-50" r="22" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.7"/>
        <circle cx="0" cy="-50" r="10" fill="url(#cyanIrl)"/>

        <g opacity="0.85">
            <rect x="-180" y="60" width="360" height="14" rx="7" fill="url(#cyanIrl)" opacity="0.4"/>
            <rect x="-150" y="84" width="300" height="6" rx="3" fill="url(#goldIrl)" opacity="0.5"/>
            <circle cx="-200" cy="68" r="6" fill="url(#goldIrl)"/>
            <circle cx="200" cy="68" r="6" fill="url(#goldIrl)"/>
        </g>
    </g>

    <text x="30" y="40" font-family="JetBrains Mono, monospace" font-size="10" fill="#d49b3a" opacity="0.7" letter-spacing="2">Nº 004 · IRL</text>
    <text x="570" y="570" font-family="Playfair Display, serif" font-style="italic" font-size="16" fill="#e8d8c4" opacity="0.7" text-anchor="end">IRL stream</text>

    <rect x="15" y="15" width="570" height="570" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.45"/>
    <rect x="30" y="30" width="540" height="540" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.2"/>

    <rect width="600" height="600" filter="url(#grainIrl)" opacity="0.5"/>
</svg>
