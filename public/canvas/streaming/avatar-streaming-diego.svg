    <text x="750" y="70" font-family="JetBrains Mono, monospace" font-size="12" fill="#d49b3a" text-anchor="end" opacity="0.7">Nº 010 — MMXXVI</text>

    <text x="400" y="900" font-family="Playfair Display, serif" font-style="italic" font-size="32" fill="#e8d8c4" text-anchor="middle">Diego S.</text>
    <text x="400" y="935" font-family="JetBrains Mono, monospace" font-size="12" fill="#d49b3a" text-anchor="middle" letter-spacing="3">CLIENTE · 1 AÑO</text>

    <rect x="20" y="20" width="760" height="960" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.45"/>
    <rect x="35" y="35" width="730" height="930" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.2"/>

