        </linearGradient>
        <linearGradient id="hairA3" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1a0a08"/>
            <stop offset="100%" stop-color="#0a0503"/>
        </linearGradient>
        <filter id="grainA3" x="0" y="0" width="100%" height="100%">
