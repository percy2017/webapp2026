<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Hero — StreamerHub, streaming y comunidad">
    <defs>
        <linearGradient id="bgHeroS" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0a0814"/>
            <stop offset="50%" stop-color="#14101f"/>
            <stop offset="100%" stop-color="#050308"/>
        </linearGradient>
        <radialGradient id="haloHeroS" cx="0.5" cy="0.45" r="0.55">
            <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.45"/>
            <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="goldHaloHeroS" cx="0.7" cy="0.3" r="0.4">
            <stop offset="0%" stop-color="#d49b3a" stop-opacity="0.32"/>
            <stop offset="100%" stop-color="#d49b3a" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="coralHaloS" cx="0.25" cy="0.75" r="0.35">
            <stop offset="0%" stop-color="#e8784a" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#e8784a" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="goldPlayS" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff5d8"/>
            <stop offset="50%" stop-color="#f4d870"/>
            <stop offset="100%" stop-color="#8a5a18"/>
        </linearGradient>
        <linearGradient id="playRingS" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#a78bfa"/>
            <stop offset="100%" stop-color="#5b21b6"/>
        </linearGradient>
        <linearGradient id="waveS" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="#8a5a18"/>
            <stop offset="100%" stop-color="#f4d870"/>
        </linearGradient>
        <filter id="grainHeroS" x="0" y="0" width="100%" height="100%">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="11"/>
            <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.61  0 0 0 0 0.23  0 0 0 0.18 0"/>
        </filter>
    </defs>

    <rect width="1200" height="900" fill="url(#bgHeroS)"/>
    <rect width="1200" height="900" fill="url(#haloHeroS)"/>
    <rect width="1200" height="900" fill="url(#goldHaloHeroS)"/>
    <rect width="1200" height="900" fill="url(#coralHaloS)"/>

    <g opacity="0.9">
        <circle cx="600" cy="450" r="190" fill="none" stroke="url(#playRingS)" stroke-width="3" opacity="0.65"/>
        <circle cx="600" cy="450" r="155" fill="#0a0814" stroke="url(#goldPlayS)" stroke-width="2"/>
        <path d="M 555 380 L 555 520 L 670 450 Z" fill="url(#goldPlayS)" opacity="0.95"/>
    </g>

    <g opacity="0.85">
        <rect x="320" y="380" width="14" height="140" rx="7" fill="url(#waveS)"/>
        <rect x="346" y="340" width="14" height="220" rx="7" fill="url(#waveS)"/>
        <rect x="372" y="300" width="14" height="300" rx="7" fill="url(#waveS)"/>
        <rect x="398" y="360" width="14" height="180" rx="7" fill="url(#waveS)"/>
        <rect x="424" y="320" width="14" height="260" rx="7" fill="url(#waveS)"/>
        <rect x="450" y="400" width="14" height="100" rx="7" fill="url(#waveS)"/>
        <rect x="736" y="400" width="14" height="100" rx="7" fill="url(#waveS)"/>
        <rect x="762" y="320" width="14" height="260" rx="7" fill="url(#waveS)"/>
        <rect x="788" y="360" width="14" height="180" rx="7" fill="url(#waveS)"/>
        <rect x="814" y="300" width="14" height="300" rx="7" fill="url(#waveS)"/>
        <rect x="840" y="340" width="14" height="220" rx="7" fill="url(#waveS)"/>
        <rect x="866" y="380" width="14" height="140" rx="7" fill="url(#waveS)"/>
    </g>

    <g transform="translate(990, 80)" opacity="0.92">
        <circle cx="0" cy="0" r="8" fill="#ef4444"/>
        <circle cx="0" cy="0" r="14" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
        <text x="24" y="6" font-family="JetBrains Mono, monospace" font-size="14" fill="#f4d870" letter-spacing="3">ON AIR</text>
    </g>

    <g transform="translate(600, 760)">
        <text x="0" y="0" font-family="Playfair Display, serif" font-style="italic" font-size="34" fill="#e8d8c4" text-anchor="middle">Stream, comunidad y buena energía</text>
        <text x="0" y="38" font-family="JetBrains Mono, monospace" font-size="11" fill="#d49b3a" text-anchor="middle" letter-spacing="3">PL. S — STREAMING · STREAMERHUB</text>
    </g>

    <text x="40" y="40" font-family="Playfair Display, serif" font-style="italic" font-size="14" fill="#e8d8c4" opacity="0.55">PL. S</text>
    <text x="1160" y="40" font-family="JetBrains Mono, monospace" font-size="11" fill="#d49b3a" text-anchor="end" opacity="0.7">Nº 001 — MMXXVI</text>

    <rect x="15" y="15" width="1170" height="870" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.45"/>
    <rect x="30" y="30" width="1140" height="840" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.25"/>

    <rect x="0" y="0" width="1200" height="900" filter="url(#grainHeroS)" opacity="0.55"/>
</svg>
