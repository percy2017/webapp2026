<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Garantía y respaldo">
    <defs>
        <linearGradient id="bgHigh" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0a0814"/>
            <stop offset="100%" stop-color="#050308"/>
        </linearGradient>
        <radialGradient id="haloHigh" cx="0.5" cy="0.45" r="0.55">
            <stop offset="0%" stop-color="#f4d870" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#f4d870" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="goldHigh" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff5d8"/>
            <stop offset="100%" stop-color="#8a5a18"/>
        </linearGradient>
        <filter id="grainHigh" x="0" y="0" width="100%" height="100%">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="26"/>
            <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.61  0 0 0 0 0.23  0 0 0 0.18 0"/>
        </filter>
    </defs>

    <rect width="600" height="600" fill="url(#bgHigh)"/>
    <rect width="600" height="600" fill="url(#haloHigh)"/>

    <g transform="translate(300, 280)" opacity="0.95">
        <path d="M -120 0 L -80 -60 L -40 0 L -40 80 L -120 80 Z" fill="url(#goldHigh)"/>
        <rect x="-130" y="80" width="100" height="20" fill="url(#goldHigh)"/>
        <circle cx="0" cy="0" r="56" fill="none" stroke="url(#goldHigh)" stroke-width="14"/>
        <path d="M -28 -8 L -8 12 L 32 -28" stroke="url(#goldHigh)" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <g opacity="0.92">
            <path d="M 90 -70 L 130 -120 L 170 -70 L 170 -30 L 90 -30 Z" fill="url(#goldHigh)" opacity="0.7"/>
            <path d="M 110 -90 L 110 -50 L 150 -50 L 150 -90 Z" fill="#0a0814" opacity="0.6"/>
        </g>
    </g>

    <text x="30" y="40" font-family="JetBrains Mono, monospace" font-size="10" fill="#d49b3a" opacity="0.7" letter-spacing="2">PL. W — GARANTÍA</text>
    <text x="570" y="570" font-family="Playfair Display, serif" font-style="italic" font-size="16" fill="#e8d8c4" opacity="0.7" text-anchor="end">Garantía total</text>

    <rect x="15" y="15" width="570" height="570" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.45"/>
    <rect x="30" y="30" width="540" height="540" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.2"/>

    <rect width="600" height="600" filter="url(#grainHigh)" opacity="0.5"/>
</svg>
