<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Acceso inmediato HD/4K">
    <defs>
        <linearGradient id="bgSetup" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0a0814"/>
            <stop offset="100%" stop-color="#050308"/>
        </linearGradient>
        <radialGradient id="haloSetup" cx="0.5" cy="0.45" r="0.55">
            <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="goldSetup" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff5d8"/>
            <stop offset="50%" stop-color="#f4d870"/>
            <stop offset="100%" stop-color="#8a5a18"/>
        </linearGradient>
        <filter id="grainSetup" x="0" y="0" width="100%" height="100%">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="21"/>
            <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.61  0 0 0 0 0.23  0 0 0 0.18 0"/>
        </filter>
    </defs>

    <rect width="600" height="600" fill="url(#bgSetup)"/>
    <rect width="600" height="600" fill="url(#haloSetup)"/>

    <g transform="translate(300, 280)" opacity="0.95">
        <rect x="-180" y="-130" width="360" height="220" rx="14" fill="#14101f" stroke="url(#goldSetup)" stroke-width="3"/>
        <rect x="-160" y="-110" width="320" height="180" rx="6" fill="#0a0814"/>
        <text x="0" y="-32" font-family="Crimson Pro, serif" font-style="italic" font-size="40" fill="url(#goldSetup)" text-anchor="middle" font-weight="700">4K</text>
        <text x="0" y="6" font-family="JetBrains Mono, monospace" font-size="11" fill="#d49b3a" text-anchor="middle" letter-spacing="4">ULTRA HD · HDR</text>
        <line x1="-90" y1="22" x2="90" y2="22" stroke="url(#goldSetup)" stroke-width="0.6" opacity="0.55"/>
        <text x="0" y="42" font-family="JetBrains Mono, monospace" font-size="9" fill="#e8d8c4" text-anchor="middle" letter-spacing="3" opacity="0.7">PERFILES SIMULTÁNEOS</text>
        <rect x="-30" y="92" width="60" height="14" rx="3" fill="url(#goldSetup)" opacity="0.85"/>
        <rect x="-80" y="106" width="160" height="6" rx="3" fill="#14101f" stroke="url(#goldSetup)" stroke-width="1.5" opacity="0.7"/>
        <g transform="translate(0, 130)" opacity="0.92">
            <circle cx="-32" cy="0" r="4" fill="url(#goldSetup)"/>
            <circle cx="-12" cy="0" r="4" fill="url(#goldSetup)"/>
            <circle cx="8" cy="0" r="4" fill="url(#goldSetup)"/>
            <circle cx="28" cy="0" r="4" fill="url(#goldSetup)"/>
        </g>
    </g>

    <text x="30" y="40" font-family="JetBrains Mono, monospace" font-size="10" fill="#d49b3a" opacity="0.7" letter-spacing="2">PL. W — ACCESO</text>
    <text x="570" y="570" font-family="Playfair Display, serif" font-style="italic" font-size="16" fill="#e8d8c4" opacity="0.7" text-anchor="end">Acceso inmediato</text>

    <rect x="15" y="15" width="570" height="570" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.45"/>
    <rect x="30" y="30" width="540" height="540" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.2"/>

    <rect width="600" height="600" filter="url(#grainSetup)" opacity="0.5"/>
</svg>
