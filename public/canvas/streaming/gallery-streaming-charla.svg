<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Soporte 24/7 por WhatsApp">
    <defs>
        <linearGradient id="bgCharla" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0a0814"/>
            <stop offset="100%" stop-color="#050308"/>
        </linearGradient>
        <radialGradient id="haloCharla" cx="0.5" cy="0.45" r="0.55">
            <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="goldCharla" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff5d8"/>
            <stop offset="50%" stop-color="#f4d870"/>
            <stop offset="100%" stop-color="#8a5a18"/>
        </linearGradient>
        <filter id="grainCharla" x="0" y="0" width="100%" height="100%">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="25"/>
            <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.61  0 0 0 0 0.23  0 0 0 0.18 0"/>
        </filter>
    </defs>

    <rect width="600" height="600" fill="url(#bgCharla)"/>
    <rect width="600" height="600" fill="url(#haloCharla)"/>

    <g transform="translate(300, 280)" opacity="0.95">
        <path d="M -130 -60 Q -130 -100 -90 -100 L 70 -100 Q 110 -100 110 -60 L 110 0 Q 110 40 70 40 L -50 40 L -90 80 L -90 40 Q -130 40 -130 0 Z" fill="url(#goldCharla)"/>
        <circle cx="-60" cy="-30" r="10" fill="#0a0814"/>
        <circle cx="-15" cy="-30" r="10" fill="#0a0814"/>
        <circle cx="30" cy="-30" r="10" fill="#0a0814"/>
        <path d="M 30 80 Q 30 40 70 40 L 200 40 Q 240 40 240 80 L 240 130 Q 240 170 200 170 L 130 170 L 100 210 L 100 170 Q 30 170 30 130 Z" fill="#22c55e" opacity="0.92"/>
        <circle cx="100" cy="105" r="10" fill="#fff5d8"/>
        <circle cx="145" cy="105" r="10" fill="#fff5d8"/>
        <circle cx="190" cy="105" r="10" fill="#fff5d8"/>
    </g>

    <text x="30" y="40" font-family="JetBrains Mono, monospace" font-size="10" fill="#d49b3a" opacity="0.7" letter-spacing="2">PL. W — SOPORTE</text>
    <text x="570" y="570" font-family="Playfair Display, serif" font-style="italic" font-size="16" fill="#e8d8c4" opacity="0.7" text-anchor="end">Soporte 24/7</text>

    <rect x="15" y="15" width="570" height="570" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.45"/>
    <rect x="30" y="30" width="540" height="540" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.2"/>

    <rect width="600" height="600" filter="url(#grainCharla)" opacity="0.5"/>
</svg>
