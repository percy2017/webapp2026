        <path d="M -78 -78 L 78 -78 L 78 26 Q 78 80 0 105 Q -78 80 -78 26 Z" fill="#0a0814"/>
        <text x="0" y="20" font-family="Playfair Display, serif" font-style="italic" font-size="62" fill="url(#goldWin)" text-anchor="middle">#1</text>
        <rect x="-50" y="130" width="100" height="14" rx="2" fill="url(#goldWin)"/>
        <rect x="-90" y="146" width="180" height="22" rx="3" fill="#14101f" stroke="url(#goldWin)" stroke-width="2"/>
        <text x="0" y="162" font-family="JetBrains Mono, monospace" font-size="10" fill="#f4d870" text-anchor="middle" letter-spacing="3">VICTORY</text>

        <g opacity="0.9">
            <path d="M -160 -40 L -150 -55 L -140 -40 L -125 -50 L -135 -35 L -120 -30 L -135 -25 L -125 -10 L -140 -20 L -150 -5 L -160 -20 L -170 -5 L -180 -20 L -170 -35 L -185 -50 L -170 -40 Z" fill="#f4d870"/>
            <path d="M 160 -40 L 170 -55 L 180 -40 L 195 -50 L 185 -35 L 200 -30 L 185 -25 L 195 -10 L 180 -20 L 170 -5 L 160 -20 L 150 -5 L 140 -20 L 150 -35 L 135 -50 L 150 -40 Z" fill="#f4d870"/>
