<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Gallery — Win épico">
    <defs>
        <linearGradient id="bgWin" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0a0814"/>
            <stop offset="100%" stop-color="#050308"/>
        </linearGradient>
        <radialGradient id="haloWin" cx="0.5" cy="0.45" r="0.55">
            <stop offset="0%" stop-color="#f4d870" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#f4d870" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="goldWin" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff5d8"/>
