<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Gallery — Torneo con la comunidad">
    <defs>
        <linearGradient id="bgTorneo" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0a0814"/>
            <stop offset="100%" stop-color="#050308"/>
        </linearGradient>
        <radialGradient id="haloTorneo" cx="0.5" cy="0.45" r="0.55">
            <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="goldTorneo" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff5d8"/>
            <stop offset="50%" stop-color="#f4d870"/>
            <stop offset="100%" stop-color="#8a5a18"/>
        </linearGradient>
        <filter id="grainTorneo" x="0" y="0" width="100%" height="100%">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="24"/>
            <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.61  0 0 0 0 0.23  0 0 0 0.18 0"/>
        </filter>
    </defs>

    <rect width="600" height="600" fill="url(#bgTorneo)"/>
    <rect width="600" height="600" fill="url(#haloTorneo)"/>

    <g transform="translate(300, 290)" opacity="0.95">
        <path d="M -170 -60 L -130 -90 L -130 70 L -90 70 L -90 110 L -170 110 L -170 70 L -130 70 Z" fill="url(#goldTorneo)"/>
        <path d="M 170 -60 L 130 -90 L 130 70 L 90 70 L 90 110 L 170 110 L 170 70 L 130 70 Z" fill="url(#goldTorneo)"/>
        <rect x="-30" y="-90" width="60" height="180" rx="8" fill="url(#goldTorneo)"/>
        <circle cx="0" cy="-30" r="36" fill="none" stroke="#0a0814" stroke-width="3"/>
        <path d="M -16 -50 L -16 -10 L 16 -30 Z" fill="#0a0814"/>

        <text x="0" y="170" font-family="JetBrains Mono, monospace" font-size="14" fill="#f4d870" text-anchor="middle" letter-spacing="4">VS</text>
    </g>

    <text x="30" y="40" font-family="JetBrains Mono, monospace" font-size="10" fill="#d49b3a" opacity="0.7" letter-spacing="2">Nº 005 · TORNEO</text>
    <text x="570" y="570" font-family="Playfair Display, serif" font-style="italic" font-size="16" fill="#e8d8c4" opacity="0.7" text-anchor="end">Torneo</text>

    <rect x="15" y="15" width="570" height="570" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.45"/>
    <rect x="30" y="30" width="540" height="540" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.2"/>

    <rect width="600" height="600" filter="url(#grainTorneo)" opacity="0.5"/>
</svg>
