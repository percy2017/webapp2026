<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Sample gallery 1">
    <defs>
        <linearGradient id="bgG1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0a0814"/>
            <stop offset="100%" stop-color="#050308"/>
        </linearGradient>
        <radialGradient id="haloG1" cx="0.5" cy="0.45" r="0.55">
            <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="goldG1" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff5d8"/>
            <stop offset="100%" stop-color="#8a5a18"/>
        </linearGradient>
        <linearGradient id="cyanG1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#67e8f9"/>
            <stop offset="100%" stop-color="#0e7490"/>
        </linearGradient>
        <filter id="grainG1" x="0" y="0" width="100%" height="100%">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="33"/>
            <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.61  0 0 0 0 0.23  0 0 0 0.18 0"/>
        </filter>
    </defs>

    <rect width="600" height="600" fill="url(#bgG1)"/>
    <rect width="600" height="600" fill="url(#haloG1)"/>

    <g transform="translate(300, 280)" opacity="0.95">
        <rect x="-150" y="-90" width="300" height="180" rx="10" fill="#14101f" stroke="url(#goldG1)" stroke-width="2"/>
        <rect x="-130" y="-70" width="260" height="140" rx="4" fill="#0a0814"/>
        <circle cx="0" cy="0" r="44" fill="none" stroke="url(#cyanG1)" stroke-width="2.5"/>
        <path d="M -14 -22 L -14 22 L 24 0 Z" fill="url(#cyanG1)"/>
    </g>

    <text x="30" y="40" font-family="JetBrains Mono, monospace" font-size="10" fill="#d49b3a" opacity="0.7" letter-spacing="2">SAMPLE · GALLERY 01</text>
    <text x="570" y="570" font-family="Playfair Display, serif" font-style="italic" font-size="16" fill="#e8d8c4" opacity="0.7" text-anchor="end">Imagen 1</text>

    <rect x="15" y="15" width="570" height="570" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.45"/>
    <rect x="30" y="30" width="540" height="540" fill="none" stroke="#d49b3a" stroke-width="0.5" opacity="0.2"/>

    <rect width="600" height="600" filter="url(#grainG1)" opacity="0.5"/>
</svg>
